<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="O açougue Bumba Meu Boi é o mais tradicional de São Paulo, servindo com qualidade desde 1501!">
    <title>Açougue Bumba Meu Boi</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/e2edc3d57c.js" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="header-social">
            <i class="fa-brands fa-facebook blue"></i>
            <i class="fa-brands fa-youtube red"></i>
        </div>

        <div class="header-title">

            <h1>Bumba meu Boi</h1>

            <img src="midia/logo-old.svg" alt="Uma ilustração do rosto de um boi" title="Bumba meu Boi">

            <div class="header-frame-container">
                <div id="header-frame"></div>
            </div>

        </div>

        <div class="header-nav-button">

            <input type="checkbox" id="header-menu-toggle">

            <label for="header-menu-toggle" class="header-menu-button-container">

                <div class="header-menu-button"></div>

            </label>

            <nav class="header-menu">

                <ul class="nav-links">
                    <li>Example</li>
                    <li>Example</li>
                    <li>Example</li>
                    <li>Example</li>
                </ul>

            </nav>

            <div class="modal"></div>

        </div>
    </header>
    <main>
        <section id="destaque">

        </section>
        
        <section id="bovinos">
            <div class="section-bar">
                <div class="circle">
                    <img src="midia/meat.svg" alt="Ilustração de um bife" class="section-icon">
                    <div class="circle-fill"></div>
                </div>
                <h2 class="section-title">Bovinos</h2>
                <div class="bar-fill"></div>
            </div>
        </section>

        <section id="avinos">
            <div class="section-bar">
                <div class="circle">
                    <img src="midia/chicken-leg-chicken-svgrepo-com.svg" alt="Ilustração de uma coxa de frango assada" class="section-icon">
                    <div class="circle-fill"></div>
                </div>
                <h2 class="section-title">Avínos</h2>
                <div class="bar-fill"></div>
            </div>
        </section>

        <section id="suinos">
            <div class="section-bar">
                <div class="circle">
                    <img src="midia/sausage-svgrepo-com.svg" alt="Ilustração de uma linguiça de porco" class="section-icon">
                    <div class="circle-fill"></div>
                </div>
                <h2 class="section-title">Suínos</h2>
                <div class="bar-fill"></div>
            </div>
        </section>

        <section id="peixaria">
            <div class="section-bar">
                <div class="circle">
                    <img src="midia/fishes-fish-svgrepo-com.svg" alt="Ilustração de um peixe" class="section-icon">
                    <div class="circle-fill"></div>
                </div>
                <h2 class="section-title">Peixaria</h2>
                <div class="bar-fill"></div>
            </div>
        </section>

        <section id="sobre"></section>
    </main>
    <footer>
        <div></div>
    </footer>
</body>

</html>
