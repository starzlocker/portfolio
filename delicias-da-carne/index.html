<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="O açougue Bumba Meu Boi é o mais tradicional de São Paulo, servindo com qualidade desde 1501!">
    <title>Açougue Bumba Meu Boi</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/e2edc3d57c.js" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="header-social">
            <i class="fa-brands fa-facebook blue"></i>
            <i class="fa-brands fa-youtube red"></i>
        </div>

        <div class="header-title">

            <h1>Bumba meu Boi</h1>

            <img src="midia/logo.svg" alt="Uma ilustração do rosto de um boi" title="Bumba meu Boi">

            <div class="header-frame-container">
                <div id="header-frame"></div>
            </div>

        </div>

        <div class="header-nav-button">

            <input type="checkbox" id="header-menu-toggle">

            <label for="header-menu-toggle" class="header-menu-button-container">

                <div class="header-menu-button"></div>

            </label>

            <nav class="header-menu">

                <ul class="nav-links">
                    <li>Example</li>
                    <li>Example</li>
                    <li>Example</li>
                    <li>Example</li>
                </ul>

            </nav>

            <div class="modal"></div>

        </div>
    </header>
    <main>
        <section id="bovinos">
            <img src="midia/meat.svg" alt="Ilustração de um bife">
            <div class="section-bar"></div>
            <div class="circle"></div>
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
